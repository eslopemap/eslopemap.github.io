name: Dependency Updates

on:
  schedule:
    # 1st of every other month at 08:00 UTC
    - cron: '0 8 1 */2 *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-deps:
    name: Update All Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - uses: dtolnay/rust-toolchain@stable

      - name: Install system deps (for cargo)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - run: npm ci

      # JS vendor deps (deps.json → vendor/)
      - name: Update vendored JS dependencies
        run: node scripts/vendor-deps.mjs update

      # Rust deps (with 7-day cooldown via cargo-cooldown)
      - name: Install cargo-cooldown
        run: cargo install --locked cargo-cooldown

      - name: Update Cargo dependencies (with 7-day cooldown)
        run: cargo cooldown check
        working-directory: src-tauri
        env:
          COOLDOWN_MINUTES: '10080'

      # npm devDependencies (with 7-day cooldown)
      - name: Update npm devDependencies (with cooldown)
        run: bash scripts/npm-cooldown-update.sh
        env:
          COOLDOWN_DAYS: '7'

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet && git diff --cached --quiet && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore(deps): update all dependencies'
          title: 'chore(deps): update all dependencies'
          body: |
            Automated dependency update covering:
            - JS vendor deps (`deps.json` → `vendor-deps.mjs`)
            - Rust Cargo dependencies (`cargo update`)
            - npm devDependencies (`npm update`)

            Triggered by: ${{ github.event_name == 'schedule' && 'bi-monthly cron' || 'manual dispatch' }}
          branch: deps/update-all
          labels: dependencies
          delete-branch: true
