<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Slope viewer & editor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1,maximum-scale=1,user-scalable=no" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="manifest" href="manifest.json" />

  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="https://unpkg.com/@eslopemap/maplibre-gl@5.21.9/dist/maplibre-gl.css" />
  <script src="https://unpkg.com/@eslopemap/maplibre-gl@5.21.9/dist/maplibre-gl.js"></script>
  <script src="https://unpkg.com/maplibre-contour@0.0.5/dist/index.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3/dist/chartjs-plugin-annotation.min.js"></script>
  <script type="importmap">{"imports":{"@we-gold/gpxjs":"https://cdn.jsdelivr.net/npm/@we-gold/gpxjs@1.1.0/+esm"}}</script>
</head>
<body>
  <div id="map"></div>

  <div id="controls-wrapper">
  <div id="toolbar">
    <button id="controls-toggle">🌍 Settings ▾</button>
    <div id="search-box">
      <button id="search-icon">&#128269;</button>
      <input id="search-input" type="text" placeholder="Search location..." autocomplete="off" />
      <div id="search-results"></div>
    </div>
  </div>
  <div id="controls" class="panel-surface panel-padded">
    <div class="row">
      <label for="mode"><strong>Mode</strong></label><br />
      <select id="mode">
        <option value=""></option>
        <option value="slope+relief" selected>Slope + Color relief</option>
        <option value="slope">Slope</option>
        <option value="aspect">Aspect</option>
        <option value="color-relief">Color relief</option>
      </select>
    </div>

    <div class="row">
      <label for="basemap"><strong>Basemap</strong></label><br />
      <select id="basemap">
        <option value="none">None</option>
        <option value="osm" selected>OSM</option>
        <option value="otm">OTM</option>
        <option value="ign-plan">IGN plan (FR)</option>
        <option value="swisstopo-vector">SwissTopo vector</option>
        <option value="swisstopo-raster">SwissTopo raster</option>
        <option value="ign-topo">IGN topo (FR)</option>
        <option value="ign-ortho">IGN ortho (FR)</option>
        <option value="kartverket">Kartverket topo (NO)</option>
      </select>
    </div>

    <div class="row">
      <label><input id="showContours" type="checkbox" checked /> Contour lines</label>
    </div>

    <div class="row">
      <label><input id="showOpenSkiMap" type="checkbox" /> OpenSkiMap overlay</label>
    </div>
    <div class="row">
      <label><input id="showSwisstopoSki" type="checkbox" /> SwissTopo ski routes (CH)</label>
      <label><input id="showSwisstopoSlope" type="checkbox" /> SwissTopo slope >30° (CH)</label>
    </div>
    <div class="row">
      <label><input id="showIgnSki" type="checkbox" /> IGN ski routes (FR)</label>
      <label><input id="showIgnSlopes" type="checkbox" /> IGN slope >30° (FR)</label>
    </div>

    <div class="row">
      <label><input id="terrain3d" type="checkbox" /> 3D terrain</label>
    </div>

    <button id="advanced-toggle" type="button"><span class="arrow">&#9654;</span> Advanced</button>
    <div id="advanced-section">
      <div class="row">
        <label for="basemapOpacity"><strong>Basemap opacity</strong>: <span id="basemapOpacityValue">1.00</span></label><br />
        <input id="basemapOpacity" type="range" min="0" max="1" step="0.01" value="1" />
      </div>

      <div class="row">
        <label for="slopeOpacity"><strong>Analysis opacity</strong>: <span id="slopeOpacityValue">0.45</span></label><br />
        <input id="slopeOpacity" type="range" min="0" max="1" step="0.01" value="0.45" />
      </div>

      <div class="row">
        <label for="hillshadeOpacity"><strong>Hillshade opacity</strong>: <span id="hillshadeOpacityValue">0.10</span></label><br />
        <input id="hillshadeOpacity" type="range" min="0" max="1" step="0.01" value="0.10" />
      </div>

      <div class="row">
        <label for="hillshadeMethod"><strong>Hillshade method</strong></label><br />
        <select id="hillshadeMethod">
          <option value="standard">Standard</option>
          <option value="basic">Basic</option>
          <option value="combined">Combined</option>
          <option value="multidirectional" selected>Multidirectional</option>
          <option value="igor">Igor</option>
        </select>
      </div>

      <div class="row">
        <label for="cursorInfoMode"><strong>Elevation &amp; slope</strong></label><br />
        <select id="cursorInfoMode">
          <option value="cursor" selected>At cursor</option>
          <option value="corner">Corner</option>
          <option value="no">No</option>
        </select>
      </div>

      <div class="row">
        <label><input id="multiplyBlend" type="checkbox" checked /> Multiply blend</label>
      </div>

      <div class="row">
        <label><input id="showTileGrid" type="checkbox" /> Show DEM tile grid</label>
      </div>

      <div class="row">
        <label for="terrainExaggeration"><strong>Terrain exaggeration</strong>: <span id="terrainExaggerationValue">1.40</span></label><br />
        <input id="terrainExaggeration" type="range" min="1" max="3" step="0.1" value="1.4" disabled />
      </div>

      <div class="row">
        <label for="pauseThreshold"><strong>Pause threshold</strong>: <span id="pauseThresholdValue">5</span> min</label><br />
        <input id="pauseThreshold" type="range" min="1" max="30" step="1" value="5" />
      </div>

      <div class="row">
        <label for="profileSmoothing"><strong>Profile smoothing</strong>: <span id="profileSmoothingValue">3</span></label><br />
        <input id="profileSmoothing" type="range" min="0" max="15" step="1" value="3" />
      </div>

      <div class="row">
        <button id="clear-data-btn" type="button" class="tb-btn" title="Clear saved tracks and settings from localStorage">Clear saved data</button>
      </div>

      <div class="row" id="mobile-mode-row" style="display:none">
        <label><input id="mobileModeDesktop" type="checkbox" /> Mobile editing mode (desktop)</label>
      </div>
    </div>
  </div>
  </div>

  <div id="edit-rail">
    <button id="rail-edit-btn" class="rail-btn" title="Edit active track (E)" disabled>✎</button>
    <button id="rail-rect-btn" class="rail-btn" title="Rectangle select (R)" disabled>⬚</button>

  </div>

  <div id="track-panel-shell">
    <div id="track-tool-row">

      <button id="undo-btn" class="tb-btn" title="Undo (Ctrl+Z)" style="display:none">↩ ⎌</button>
      <button id="draw-btn" class="tb-btn" title="New track">&#43;</button>
      <button id="import-url-btn" class="tb-btn" title="Import GPX from URL">🔗</button>
      <button id="open-file-btn" class="tb-btn" title="Open GPX/GeoJSON file">📄</button>
      <button id="open-folder-btn" class="tb-btn" title="Open GPX folder">📁</button>
      <span id="importUrlStatus" style="font-size: 0.8em; color: red; display: none; padding: 0 5px;"></span>
      <button id="profile-toggle-btn" class="tb-btn" title="Elevation profile" disabled>📈</button>
      <button id="active-actions-btn" class="tb-btn" title="Workspace actions">⋮</button>
      <button id="selection-mode-btn" class="tb-btn" title="Rectangle selection (R)" disabled>▣</button>
      <button id="densify-btn" class="tb-btn op-btn" title="Add intermediate points" disabled style="display:none">＋•</button>
      <button id="simplify-btn" class="tb-btn op-btn" title="Simplify active span" disabled style="display:none">≈</button>
      <button id="split-btn" class="tb-btn op-btn" title="Split active track or selection" disabled style="display:none">✂</button>
      <button id="merge-btn" class="tb-btn op-btn" title="Merge grouped tracks or segments" disabled style="display:none">⇄</button>
      <button id="convert-route-btn" class="tb-btn op-btn" title="Convert route to track" disabled style="display:none">⇢</button>
      <button id="tracks-btn" class="tb-btn" title="Track list" disabled>📍</button>
    </div>
    <div id="track-panel">
      <div class="track-panel-header">
        <h3>Tracks</h3>
      </div>
      <div id="track-list"></div>
      <div class="track-export-bar">
        <button id="export-gpx-btn">Export active GPX</button>
        <button id="export-geojson-btn">Export active GeoJSON</button>
        <button id="export-all-gpx-btn">Export all GPX</button>
      </div>
      <div class="track-export-bar">
        <button id="save-folder-btn">Save to folder…</button>
      </div>
    </div>
  </div>

  <div id="drop-overlay">Drop GPX / GeoJSON file here</div>
  <div id="mobile-move-hint">Pan map to move point &bull; tap elsewhere to deselect</div>
  <div id="cursor-tooltip"></div>
  <div id="mobile-crosshair"></div>
  <div id="draw-crosshair"></div>
  <div id="toast"></div>

  <div id="profile-panel" class="panel-surface">
    <div id="profile-header">
      <div id="profile-menu">
        <button id="profile-menu-btn" class="tb-btn" title="Display settings">⚙</button>
        <div id="profile-menu-dropdown">
          <label><input type="checkbox" id="prof-show-elevation" checked /> Elevation</label>
          <label><input type="checkbox" id="prof-show-trackslope" checked /> Track slope</label>
          <label><input type="checkbox" id="prof-show-terrainslope" checked /> Terrain slope</label>
          <label><input type="checkbox" id="prof-show-speed" /> Speed</label>
          <label><input type="checkbox" id="prof-show-vspeed" /> Vertical speed</label>
          <label><input type="checkbox" id="prof-show-pauses" checked /> Pauses</label>
          <hr />
          <label>X-axis:
            <select id="prof-x-axis">
              <option value="distance" selected>Distance</option>
              <option value="time">Time</option>
              <option value="time-no-pauses">Time (no pauses)</option>
              <option value="datetime">Date/Time</option>
            </select>
          </label>
        </div>
      </div>
      <span id="profile-legend"></span>
      <span id="profile-filter-badge"></span>
      <button id="profile-filter-reset" class="tb-btn" title="Show full track" style="display:none">Full</button>
      <button id="profile-resize-btn" class="tb-btn" title="Toggle size">⇕</button>
      <button id="profile-close" title="Close">&times;</button>
    </div>
    <canvas id="profile-canvas"></canvas>
  </div>

  <div id="legend" class="panel-surface panel-padded" style="background: rgba(255,255,255,0.3);">
    <div id="legendRamp" class="ramp" title="Slope (degrees)"></div>
    <div id="legendLabels" class="labels"></div>
    <div id="cursor-info"><code id="cursorElevation">n/a</code> &middot; Slope: <code id="cursorSlope">n/a</code></div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
