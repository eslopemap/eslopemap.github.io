<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spike 2 — File-Centric GPX Sync</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>

<header>
    <h1>GPX Sync</h1>
    <span id="folder-path">No folder selected</span>
    <span id="runtime-badge"></span>
    <button id="btn-watch" class="btn-primary">Watch Folder</button>
</header>

<div class="main-layout">
    <!-- Sidebar: file list -->
    <div class="sidebar">
        <div class="sidebar-header">Files</div>
        <div id="file-list" class="file-list"></div>
    </div>

    <!-- Editor area -->
    <div class="editor-area">
        <div class="editor-toolbar">
            <span id="editor-title" class="file-title"></span>
            <button id="btn-simulate" class="btn-secondary">Simulate External Change</button>
            <button id="btn-reload" class="btn-secondary" disabled>Reload from Disk</button>
            <button id="btn-save" class="btn-success" disabled>Save</button>
        </div>

        <div id="conflict-bar" class="conflict-bar">
            <span class="conflict-msg">This file was changed on disk while you had unsaved edits.</span>
            <button id="btn-keep-mine" class="btn-warning">Keep Mine</button>
            <button id="btn-keep-disk" class="btn-primary">Load Disk Version</button>
        </div>

        <textarea id="editor" spellcheck="false" style="display:none"></textarea>
        <div id="editor-placeholder" class="editor-placeholder">Select a file to edit</div>
    </div>
</div>

<!-- Event log -->
<div class="event-log">
    <div class="log-header">
        <span>Event Log</span>
        <button id="btn-clear-log" class="btn-secondary" style="padding:2px 8px;font-size:11px">Clear</button>
    </div>
    <div id="log-entries" class="log-entries"></div>
</div>

<script>
document.documentElement.setAttribute('data-inline-script-probe', '1');
window.__inlineScriptProbe = true;
window.addEventListener('error', function (event) {
    document.documentElement.setAttribute('data-script-error', String(event.message || 'unknown-error'));
});
window.addEventListener('unhandledrejection', function (event) {
    var reason = event.reason;
    var message = reason && reason.message ? reason.message : String(reason || 'unknown-rejection');
    document.documentElement.setAttribute('data-script-rejection', message);
});
</script>

<script>
try {
window.__pageProbe = { ready: true };
document.documentElement.setAttribute('data-page-probe', '1');

// ---------------------------------------------------------------------------
// Runtime detection
// ---------------------------------------------------------------------------

const isTauri = Boolean(window.__TAURI_INTERNALS__);

async function tauriInvoke(cmd, args) {
    if (!isTauri) throw new Error('Not in Tauri runtime');
    return window.__TAURI_INTERNALS__.invoke(cmd, args);
}

// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------

let watchedFolder = null;
const fileStates = new Map();
let selectedPath = null;
let editorContent = '';
let originalContent = '';
let diskConflictContent = null;
let browserDirHandle = null;

// ---------------------------------------------------------------------------
// DOM references
// ---------------------------------------------------------------------------

const $folderPath = document.getElementById('folder-path');
const $runtimeBadge = document.getElementById('runtime-badge');
const $btnWatch = document.getElementById('btn-watch');
const $btnSave = document.getElementById('btn-save');
const $btnReload = document.getElementById('btn-reload');
const $btnSimulate = document.getElementById('btn-simulate');
const $fileList = document.getElementById('file-list');
const $editor = document.getElementById('editor');
const $editorPlaceholder = document.getElementById('editor-placeholder');
const $editorTitle = document.getElementById('editor-title');
const $conflictBar = document.getElementById('conflict-bar');
const $btnKeepMine = document.getElementById('btn-keep-mine');
const $btnKeepDisk = document.getElementById('btn-keep-disk');
const $logEntries = document.getElementById('log-entries');
const $btnClearLog = document.getElementById('btn-clear-log');

// ---------------------------------------------------------------------------
// Initialization
// ---------------------------------------------------------------------------

function init() {
    $runtimeBadge.textContent = isTauri ? 'Tauri' : 'Browser';
    $runtimeBadge.className = isTauri ? 'tauri' : 'browser';

    $btnWatch.addEventListener('click', onWatchFolder);
    $btnSave.addEventListener('click', onSave);
    $btnReload.addEventListener('click', onReload);
    $btnSimulate.addEventListener('click', onSimulateExternalChange);
    $btnKeepMine.addEventListener('click', () => onResolveConflict('app'));
    $btnKeepDisk.addEventListener('click', () => onResolveConflict('disk'));
    $btnClearLog.addEventListener('click', () => { $logEntries.innerHTML = ''; });

    $editor.addEventListener('input', onEditorInput);

    if (isTauri) {
        setupTauriEvents();
    }

    if (isTauri) {
        $btnSimulate.style.display = 'none';
    }

    updateUI();
}

// ---------------------------------------------------------------------------
// Tauri event listener
// ---------------------------------------------------------------------------

function setupTauriEvents() {
    if (window.__TAURI_INTERNALS__ && typeof window.__TAURI_INTERNALS__.convertCallback === 'function') {
        const handler = (event) => {
            const events = event.payload;
            if (!Array.isArray(events)) return;
            for (const ev of events) {
                handleSyncEvent(ev);
            }
        };
        window.__TAURI_INTERNALS__.invoke('plugin:event|listen', {
            event: 'gpx:sync-events',
            target: { kind: 'Any' },
            handler: window.__TAURI_INTERNALS__.convertCallback(handler),
        });
    }
}

// ---------------------------------------------------------------------------
// Watch folder
// ---------------------------------------------------------------------------

async function onWatchFolder() {
    if (isTauri) {
        await onWatchFolderTauri();
    } else {
        await onWatchFolderBrowser();
    }
}

async function onWatchFolderTauri() {
    try {
        const result = await window.__TAURI_INTERNALS__.invoke('plugin:dialog|open', {
            directory: true,
            multiple: false,
            title: 'Select GPX folder to watch',
        });
        if (!result) return;
        const folderPath = typeof result === 'string' ? result : result.path;
        await watchFolderByPath(folderPath);
    } catch (err) {
        logEvent('error', `Watch failed: ${err}`);
    }
}

async function watchFolderByPath(folderPath) {
    const pickResult = await tauriInvoke('pick_and_watch_folder', { folderPath });
    watchedFolder = pickResult.snapshot.folder;
    syncFilesFromSnapshot(pickResult.snapshot);
    logEvent('watch', `Watching: ${watchedFolder}`);
    return pickResult.snapshot;
}

async function onWatchFolderBrowser() {
    try {
        if (!('showDirectoryPicker' in window)) {
            logEvent('error', 'File System Access API not supported in this browser');
            return;
        }
        browserDirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
        watchedFolder = browserDirHandle.name;
        await scanBrowserFolder();
        logEvent('watch', `Watching (browser): ${watchedFolder}`);
        startBrowserPolling();
    } catch (err) {
        if (err.name !== 'AbortError') {
            logEvent('error', `Watch failed: ${err}`);
        }
    }
}

// ---------------------------------------------------------------------------
// Browser mode: File System Access API
// ---------------------------------------------------------------------------

let browserPollingTimer = null;
const browserFileHashes = new Map();

async function scanBrowserFolder() {
    fileStates.clear();
    browserFileHashes.clear();
    const entries = browserDirHandle.entries();
    while (true) {
        const step = await entries.next();
        if (step.done) break;
        const [name, handle] = step.value;
        if (handle.kind === 'file' && name.endsWith('.gpx')) {
            const file = await handle.getFile();
            const text = await file.text();
            const hash = await hashString(text);
            browserFileHashes.set(name, hash);
            fileStates.set(name, { path: name, status: 'clean', content_hash: hash, mtime_secs: Math.floor(file.lastModified / 1000) });
        }
    }
    updateUI();
}

function startBrowserPolling() {
    if (browserPollingTimer) clearInterval(browserPollingTimer);
    browserPollingTimer = setInterval(pollBrowserFolder, 1500);
}

async function pollBrowserFolder() {
    if (!browserDirHandle) return;
    const currentPaths = new Set();
    const entries = browserDirHandle.entries();
    while (true) {
        const step = await entries.next();
        if (step.done) break;
        const [name, handle] = step.value;
        if (handle.kind === 'file' && name.endsWith('.gpx')) {
            currentPaths.add(name);
            const file = await handle.getFile();
            const text = await file.text();
            const hash = await hashString(text);
            const oldHash = browserFileHashes.get(name);
            if (!fileStates.has(name)) {
                browserFileHashes.set(name, hash);
                fileStates.set(name, { path: name, status: 'clean', content_hash: hash, mtime_secs: Math.floor(file.lastModified / 1000) });
                handleSyncEvent({ kind: 'file_added', path: name, content: text });
            } else if (oldHash && oldHash !== hash) {
                browserFileHashes.set(name, hash);
                const state = fileStates.get(name);
                if (state.status === 'dirty_in_app' || state.status === 'conflict') {
                    handleSyncEvent({ kind: 'conflict', path: name, disk_content: text });
                } else {
                    handleSyncEvent({ kind: 'file_changed', path: name, content: text });
                }
            }
        }
    }
    for (const [path] of fileStates) {
        if (!currentPaths.has(path)) {
            handleSyncEvent({ kind: 'file_removed', path });
        }
    }
}

async function hashString(str) {
    const data = new TextEncoder().encode(str);
    const hashBuffer = await crypto.subtle.digest('SHA-256', data);
    return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
}

// ---------------------------------------------------------------------------
// Sync event handling
// ---------------------------------------------------------------------------

function handleSyncEvent(event) {
    const kind = event.kind;
    const path = event.path || event.old_path || '';
    const shortPath = path.split('/').pop() || path;

    switch (kind) {
        case 'file_added':
            fileStates.set(path, { path, status: 'clean', content_hash: '', mtime_secs: 0 });
            logEvent('file_added', shortPath);
            break;
        case 'file_changed': {
            const state = fileStates.get(path);
            if (state) state.status = 'changed_on_disk';
            if (path === selectedPath && originalContent === editorContent) {
                editorContent = event.content;
                originalContent = event.content;
                $editor.value = editorContent;
                if (state) state.status = 'clean';
                if (isTauri) { tauriInvoke('accept_change', { path }).catch(() => {}); }
                else { browserFileHashes.set(path, ''); hashString(event.content).then(h => browserFileHashes.set(path, h)); }
                logEvent('reload', `Auto-reloaded: ${shortPath}`);
            } else {
                logEvent('file_changed', shortPath);
            }
            break;
        }
        case 'file_removed':
            fileStates.delete(path);
            if (path === selectedPath) { selectedPath = null; editorContent = ''; originalContent = ''; diskConflictContent = null; }
            browserFileHashes.delete(path);
            logEvent('file_removed', shortPath);
            break;
        case 'file_renamed': {
            const oldState = fileStates.get(event.old_path);
            fileStates.delete(event.old_path);
            fileStates.set(event.new_path, Object.assign({}, oldState || {}, { path: event.new_path, status: 'clean' }));
            if (selectedPath === event.old_path) selectedPath = event.new_path;
            logEvent('file_renamed', `${event.old_path.split('/').pop()} → ${event.new_path.split('/').pop()}`);
            break;
        }
        case 'conflict': {
            const cstate = fileStates.get(path);
            if (cstate) cstate.status = 'conflict';
            diskConflictContent = event.disk_content;
            logEvent('conflict', `CONFLICT: ${shortPath}`);
            break;
        }
    }
    updateUI();
}

// ---------------------------------------------------------------------------
function syncFilesFromSnapshot(snapshot) {
    fileStates.clear();
    for (const f of snapshot.files) fileStates.set(f.path, f);
    selectedPath = null;
    editorContent = '';
    originalContent = '';
    diskConflictContent = null;
    updateUI();
}

// ---------------------------------------------------------------------------
// UI updates
// ---------------------------------------------------------------------------

function updateUI() {
    $folderPath.textContent = watchedFolder || 'No folder selected';
    $fileList.innerHTML = '';
    const sortedFiles = Array.from(fileStates.values()).sort((a, b) => a.path.localeCompare(b.path));
    for (const f of sortedFiles) {
        const shortName = f.path.split('/').pop() || f.path;
        const item = document.createElement('div');
        item.className = 'file-item' + (f.path === selectedPath ? ' selected' : '');
        item.innerHTML = `
            <span class="status-dot ${f.status}"></span>
            <span class="filename">${shortName}</span>
            ${f.status !== 'clean' ? `<span class="status-label ${f.status}">${f.status.replace(/_/g, ' ')}</span>` : ''}
        `;
        item.addEventListener('click', () => selectFile(f.path));
        $fileList.appendChild(item);
    }
    const hasFile = selectedPath !== null;
    $editor.style.display = hasFile ? 'block' : 'none';
    $editorPlaceholder.style.display = hasFile ? 'none' : 'flex';
    $editorTitle.textContent = hasFile ? (selectedPath.split('/').pop() || selectedPath) : '';
    $btnSave.disabled = !hasFile || editorContent === originalContent;
    $btnReload.disabled = !hasFile;
    const currentState = selectedPath ? fileStates.get(selectedPath) : null;
    $conflictBar.classList.toggle('visible', currentState && currentState.status === 'conflict');
}

// ---------------------------------------------------------------------------
// File selection
// ---------------------------------------------------------------------------

async function selectFile(path) {
    selectedPath = path;
    diskConflictContent = null;
    try {
        let content;
        if (isTauri) { content = await tauriInvoke('load_gpx', { path }); }
        else { content = await readBrowserFile(path); }
        editorContent = content;
        originalContent = content;
        $editor.value = content;
    } catch (err) {
        logEvent('error', `Failed to load: ${err}`);
        editorContent = ''; originalContent = ''; $editor.value = '';
    }
    updateUI();
}

async function readBrowserFile(name) {
    if (!browserDirHandle) throw new Error('No directory handle');
    const fh = await browserDirHandle.getFileHandle(name);
    return (await fh.getFile()).text();
}

// ---------------------------------------------------------------------------
// Editor input
// ---------------------------------------------------------------------------

function onEditorInput() {
    editorContent = $editor.value;
    if (editorContent !== originalContent && selectedPath) {
        const state = fileStates.get(selectedPath);
        if (state && state.status === 'clean') {
            state.status = 'dirty_in_app';
            if (isTauri) tauriInvoke('mark_dirty', { path: selectedPath }).catch(() => {});
            logEvent('app_dirty', selectedPath.split('/').pop());
        }
    }
    updateUI();
}

// ---------------------------------------------------------------------------
// Save
// ---------------------------------------------------------------------------

async function onSave() {
    if (!selectedPath) return;
    try {
        if (isTauri) { await tauriInvoke('save_gpx', { path: selectedPath, content: editorContent }); }
        else { await writeBrowserFile(selectedPath, editorContent); browserFileHashes.set(selectedPath, await hashString(editorContent)); }
        originalContent = editorContent;
        const state = fileStates.get(selectedPath);
        if (state) { state.status = 'clean'; state.content_hash = await hashString(editorContent); }
        diskConflictContent = null;
        logEvent('app_save', selectedPath.split('/').pop());
        updateUI();
    } catch (err) { logEvent('error', `Save failed: ${err}`); }
}

async function writeBrowserFile(name, content) {
    if (!browserDirHandle) throw new Error('No directory handle');
    const fh = await browserDirHandle.getFileHandle(name, { create: true });
    const w = await fh.createWritable(); await w.write(content); await w.close();
}

// ---------------------------------------------------------------------------
// Reload from disk
// ---------------------------------------------------------------------------

async function onReload() {
    if (!selectedPath) return;
    await selectFile(selectedPath);
    const state = fileStates.get(selectedPath);
    if (state) { state.status = 'clean'; if (isTauri) tauriInvoke('accept_change', { path: selectedPath }).catch(() => {}); }
    logEvent('reload', selectedPath.split('/').pop());
    updateUI();
}

// ---------------------------------------------------------------------------
// Conflict resolution
// ---------------------------------------------------------------------------

async function onResolveConflict(keep) {
    if (!selectedPath) return;
    try {
        let resolvedContent;
        if (isTauri) {
            resolvedContent = await tauriInvoke('resolve_conflict', { path: selectedPath, keep, appContent: keep === 'app' ? editorContent : null });
        } else {
            if (keep === 'disk') { resolvedContent = await readBrowserFile(selectedPath); }
            else { await writeBrowserFile(selectedPath, editorContent); browserFileHashes.set(selectedPath, await hashString(editorContent)); resolvedContent = editorContent; }
        }
        editorContent = resolvedContent; originalContent = resolvedContent; $editor.value = resolvedContent; diskConflictContent = null;
        const state = fileStates.get(selectedPath);
        if (state) { state.status = 'clean'; state.content_hash = await hashString(resolvedContent); }
        if (!isTauri) browserFileHashes.set(selectedPath, state ? state.content_hash : '');
        logEvent('resolve', `Resolved (${keep}): ${selectedPath.split('/').pop()}`);
        updateUI();
    } catch (err) { logEvent('error', `Resolve failed: ${err}`); }
}

// ---------------------------------------------------------------------------
// Simulate external change (browser mode only)
// ---------------------------------------------------------------------------

async function onSimulateExternalChange() {
    if (!selectedPath) { logEvent('error', 'Select a file first'); return; }
    const modified = editorContent + `\n<!-- External edit at ${new Date().toISOString()} -->\n`;
    try {
        if (isTauri) return;
        await writeBrowserFile(selectedPath, modified);
        logEvent('app_save', `Simulated external edit on ${selectedPath.split('/').pop()}`);
    } catch (err) { logEvent('error', `Simulate failed: ${err}`); }
}

// ---------------------------------------------------------------------------
// Event log
// ---------------------------------------------------------------------------

function logEvent(kind, detail) {
    const time = new Date().toLocaleTimeString('en-GB', { hour12: false });
    const entry = document.createElement('div');
    entry.className = 'log-entry';
    entry.innerHTML = `<span class="log-time">${time}</span><span class="log-kind ${kind}">${kind}</span><span class="log-detail">${detail}</span>`;
    $logEntries.prepend(entry);
    while ($logEntries.children.length > 200) $logEntries.removeChild($logEntries.lastChild);
}

// ---------------------------------------------------------------------------
// Boot
// ---------------------------------------------------------------------------

window.__gpxSync = { watchFolderByPath };
init();
} catch (err) {
    document.documentElement.setAttribute('data-script-error', String(err && err.stack ? err.stack : err));
    throw err;
}
</script>

</body>
</html>
