<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Simple mountain with slope indicator - readable at 16x16 -->
  <rect width="32" height="32" rx="4" fill="#2A5A8A"/>
  <!-- Mountain -->
  <polygon points="4,28 16,6 28,28" fill="#5A9A7A"/>
  <!-- Snow cap -->
  <polygon points="16,6 13,12 19,12" fill="#fff" opacity="0.9"/>
  <!-- Slope line -->
  <line x1="16" y1="6" x2="28" y2="28" stroke="#FF6B35" stroke-width="2" stroke-dasharray="3,2" opacity="0.9"/>
</svg>
