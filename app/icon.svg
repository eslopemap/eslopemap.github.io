<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="100%" stop-color="#E0F0FF"/>
    </linearGradient>
    <linearGradient id="slope1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B9DC3"/>
      <stop offset="100%" stop-color="#5A7DA8"/>
    </linearGradient>
    <linearGradient id="slope2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6B8E9C"/>
      <stop offset="60%" stop-color="#4A7A6B"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="64" fill="url(#sky)"/>
  <!-- Back mountain (steeper, grey-blue) -->
  <polygon points="60,420 200,120 340,420" fill="url(#slope1)" opacity="0.7"/>
  <!-- Front mountain (prominent peak with steep slope) -->
  <polygon points="140,420 310,80 480,420" fill="url(#slope2)"/>
  <!-- Snow cap -->
  <polygon points="310,80 280,160 340,160" fill="#fff" opacity="0.9"/>
  <polygon points="280,160 260,200 310,185 340,160" fill="#fff" opacity="0.5"/>
  <!-- Slope angle indicator line -->
  <line x1="310" y1="80" x2="480" y2="420" stroke="#FF6B35" stroke-width="6" stroke-dasharray="12,8" opacity="0.85"/>
  <!-- Angle arc at base -->
  <path d="M 480,420 A 60,60 0 0,0 440,380" stroke="#FF6B35" stroke-width="4" fill="none" opacity="0.85"/>
  <!-- Degree symbol text -->
  <text x="445" y="375" font-family="system-ui,sans-serif" font-size="36" font-weight="700" fill="#FF6B35" opacity="0.9">°</text>
  <!-- Track line on mountain -->
  <polyline points="190,370 230,300 270,320 310,250 350,280 380,330 410,370" fill="none" stroke="#E040FB" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
  <!-- Track dots -->
  <circle cx="190" cy="370" r="5" fill="#22c55e"/>
  <circle cx="410" cy="370" r="5" fill="#ef4444"/>
</svg>
