<!DOCTYPE html>
<html><head>
  <meta charset="utf-8" />
  <title>3D Bisect 7: zoom expression for opacity</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://unpkg.com/@eslopemap/maplibre-gl@5.21.2/dist/maplibre-gl.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/@eslopemap/maplibre-gl@5.21.2/dist/maplibre-gl.css" />
  <style>html, body, #map { margin: 0; width: 100%; height: 100%; }
    #info { position: absolute; top: 10px; left: 10px; z-index: 10; background: #fff; padding: 8px 12px; border-radius: 6px; font: 13px system-ui; box-shadow: 0 1px 4px rgba(0,0,0,.3); max-width: 450px; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="info">
    <b>3D Bisect 7: zoom expression for opacity</b><br>
    After addLayer, setPaintProperty changes opacity to a zoom-interpolation expression
    (this is what applyModeState does in slope+relief mode).<br>
    <label><input type="checkbox" id="toggle3d"> Enable 3D terrain</label>
  </div>
  <script>
    const map = new maplibregl.Map({
      container: 'map',
      center: [6.8652, 45.8326], zoom: 12,
      style: {
        version: 8,
        sources: {
          osm: { type: 'raster', tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'], tileSize: 256 },
          dem: { type: 'raster-dem', tiles: ['https://tiles.mapterhorn.com/{z}/{x}/{y}.webp'], tileSize: 512, maxzoom: 14, encoding: 'terrarium' }
        },
        layers: [
          { id: 'basemap', type: 'raster', source: 'osm' },
          { id: 'dem-loader', type: 'hillshade', source: 'dem', paint: { 'hillshade-exaggeration': 0.10 } }
        ]
      }
    });
    map.on('load', () => {
      map.addLayer({
        id: 'analysis', type: 'terrain-analysis', source: 'dem',
        paint: {
          'terrain-analysis-attribute': 'slope',
          'terrain-analysis-opacity': 0.45,
          'terrain-analysis-color': ['step', ['slope'],
            '#ffffff', 20, '#c0ffff', 28, '#00d3db', 34, '#ffc256',
            40, '#ff0000', 52, '#5e1eff', 65, '#aaaaaa'],
          'blend-mode': 'multiply'
        }
      });
      console.log('[bisect7] Layer added with flat opacity');

      // THIS IS THE KEY TEST: override opacity with zoom expression
      map.setPaintProperty('analysis', 'terrain-analysis-opacity',
        ['interpolate', ['linear'], ['zoom'], 10, 0, 11, 0.45]);
      console.log('[bisect7] Opacity overridden with zoom expression');
    });
    document.getElementById('toggle3d').addEventListener('change', (e) => {
      map.setTerrain(e.target.checked ? { source: 'dem', exaggeration: 1.5 } : null);
      console.log('[bisect7] 3D', e.target.checked ? 'ON' : 'OFF');
    });
    map.on('error', e => console.error('Map error:', e.error ? e.error.message : e));
  </script>
</body></html>
