<!DOCTYPE html>
<html><head>
  <meta charset="utf-8" />
  <title>3D Bisect 13: bisect-10 + antialias + maxTileCacheZoomLevels</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://unpkg.com/@eslopemap/maplibre-gl@5.21.2/dist/maplibre-gl.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/@eslopemap/maplibre-gl@5.21.2/dist/maplibre-gl.css" />
  <style>html, body, #map { margin: 0; width: 100%; height: 100%; }
    #info { position: absolute; top: 10px; left: 10px; z-index: 10; background: #fff; padding: 8px 12px; border-radius: 6px; font: 13px system-ui; box-shadow: 0 1px 4px rgba(0,0,0,.3); max-width: 500px; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="info">
    <b>Bisect 13: bisect-10 + antialias + maxTileCacheZoomLevels</b><br>
    <label><input type="checkbox" id="toggle3d" checked> Enable 3D terrain</label>
  </div>
  <script>
    const map = new maplibregl.Map({
      container: 'map', center: [6.8652, 45.8326], zoom: 12,
      maxTileCacheZoomLevels: 20,
      canvasContextAttributes: { antialias: true },
      style: {
        version: 8,
        sources: {
          osm: { type: 'raster', tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'], tileSize: 256 },
          dem: { type: 'raster-dem', tiles: ['https://tiles.mapterhorn.com/{z}/{x}/{y}.webp'], tileSize: 512, maxzoom: 14, encoding: 'terrarium' }
        },
        layers: [
          { id: 'basemap', type: 'raster', source: 'osm' },
          { id: 'dem-loader', type: 'hillshade', source: 'dem', paint: { 'hillshade-exaggeration': 0.10 } }
        ]
      }
    });
    map.on('load', () => {
      map.setLayoutProperty('dem-loader', 'visibility', 'none');
      map.setTerrain({ source: 'dem', exaggeration: 1.4 });
      map.addLayer({ id: 'analysis', type: 'terrain-analysis', source: 'dem',
        paint: { 'attribute': 'slope', 'opacity': 0.45,
          'color': ['step',['slope'],'#ffffff',20,'#c0ffff',28,'#00d3db',34,'#ffc256',40,'#ff0000',52,'#5e1eff',65,'#aaaaaa'],
          'blend-mode': 'multiply' } });
      map.addLayer({ id: 'analysis-relief', type: 'terrain-analysis', source: 'dem',
        paint: { 'attribute': 'elevation', 'opacity': 0.45,
          'color': ['interpolate',['linear'],['elevation'],0,'#A9D4E8',500,'#C8B75F',1500,'#705B43',3000,'#D9CCBF',5000,'#F6F2EF'],
          'blend-mode': 'multiply' } });
      map.setPaintProperty('analysis', 'opacity', ['interpolate',['linear'],['zoom'],10,0,11,0.45]);
      map.setPaintProperty('analysis-relief', 'opacity', ['interpolate',['linear'],['zoom'],10,0.45,11,0]);
    });
    document.getElementById('toggle3d').addEventListener('change', (e) => {
      if (e.target.checked) { map.setLayoutProperty('dem-loader','visibility','none'); map.setTerrain({source:'dem',exaggeration:1.4}); }
      else { map.setTerrain(null); map.setLayoutProperty('dem-loader','visibility','visible'); }
    });
    map.on('error', e => console.error('Map error:', e.error ? e.error.message : e));
  </script>
</body></html>
