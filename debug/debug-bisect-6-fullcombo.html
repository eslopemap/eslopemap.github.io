<!DOCTYPE html>
<html><head>
  <meta charset="utf-8" />
  <title>3D Bisect 6: Full combo — hillshade + setTerrain + terrain-analysis</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://unpkg.com/@eslopemap/maplibre-gl@5.21.2/dist/maplibre-gl.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/@eslopemap/maplibre-gl@5.21.2/dist/maplibre-gl.css" />
  <style>html, body, #map { margin: 0; width: 100%; height: 100%; }
    #info { position: absolute; top: 10px; left: 10px; z-index: 10; background: #fff; padding: 8px 12px; border-radius: 6px; font: 13px system-ui; box-shadow: 0 1px 4px rgba(0,0,0,.3); max-width: 400px; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="info">3D Bisect 6: Full combo — hillshade, terrain-analysis via addLayer, toggle 3D<br>
    <label><input type="checkbox" id="toggle3d"> Enable 3D terrain</label>
  </div>
  <script>
    const map = new maplibregl.Map({
      container: 'map',
      center: [6.8652, 45.8326], zoom: 12,
      attributionControl: false,
      style: {
        version: 8,
        glyphs: 'https://demotiles.maplibre.org/font/{fontstack}/{range}.pbf',
        sources: {
          osm: { type: 'raster', tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'], tileSize: 256 },
          dem: { type: 'raster-dem', tiles: ['https://tiles.mapterhorn.com/{z}/{x}/{y}.webp'], tileSize: 512, maxzoom: 14, encoding: 'terrarium' }
        },
        layers: [
          { id: 'basemap', type: 'raster', source: 'osm' },
          { id: 'dem-loader', type: 'hillshade', source: 'dem', paint: {
            'hillshade-method': 'igor',
            'hillshade-exaggeration': 0.10
          }}
        ]
      }
    });
    map.on('load', () => {
      console.log('[bisect6] Adding terrain-analysis...');
      map.addLayer({
        id: 'analysis', type: 'terrain-analysis', source: 'dem',
        paint: {
          'attribute': 'slope',
          'opacity': 0.45,
          'color': [
            'step', ['slope'],
            '#ffffff', 20, '#c0ffff', 24, '#57ffff', 28, '#00d3db',
            31, '#fffa32', 34, '#ffc256', 37, '#fd7100', 40, '#ff0000',
            43, '#e958ff', 47, '#a650ff', 52, '#5e1eff', 57, '#0000ff', 65, '#aaaaaa'
          ],
          'blend-mode': 'multiply'
        }
      });
    });
    document.getElementById('toggle3d').addEventListener('change', (e) => {
      if (e.target.checked) {
        map.setTerrain({ source: 'dem', exaggeration: 1.5 });
        console.log('[bisect6] 3D ON');
      } else {
        map.setTerrain(null);
        console.log('[bisect6] 3D OFF');
      }
    });
    map.on('error', e => console.error('Map error:', e.error ? e.error.message : e));
  </script>
</body></html>
